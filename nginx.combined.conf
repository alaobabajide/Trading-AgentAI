# Validate X-Api-Key header against BRAIN_API_KEY env var (substituted at startup).
# Requests with the correct key → api_key_ok = "1"
# Requests with wrong/missing key → api_key_ok = "0"
# If BRAIN_API_KEY is empty (not yet configured) the map falls through to default "0",
# blocking all authenticated routes — set BRAIN_API_KEY in Railway env vars.
map $http_x_api_key $api_key_ok {
    default            0;
    "${BRAIN_API_KEY}" 1;
}

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # ── Public health check — Railway liveness probe, no auth required ──────────
    location = /api/health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── All other API routes — require valid X-Api-Key header ───────────────────
    location /api/ {
        if ($api_key_ok != "1") {
            return 403 '{"detail":"Forbidden — missing or invalid API key"}';
        }

        proxy_pass             http://127.0.0.1:8000/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout     300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     300s;

        add_header Content-Type "application/json" always;
    }

    # ── SPA fallback — serve index.html for all client-side routes ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
