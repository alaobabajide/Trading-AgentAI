server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → uvicorn on localhost:8000
    # Authentication is handled by FastAPI middleware (X-Api-Key header).
    # /api/health is exempt from auth in the FastAPI middleware so Railway
    # liveness probes always succeed without needing the API key.
    location /api/ {
        proxy_pass            http://127.0.0.1:8000/;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
