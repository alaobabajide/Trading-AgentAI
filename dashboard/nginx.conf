server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Brain API — points to Railway brain service
    location /api/ {
        proxy_pass https://trading-agentai-production.up.railway.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host trading-agentai-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
